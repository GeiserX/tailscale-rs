<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" role="img" aria-label="tailscale-rs — Pure-Rust Tailscale, tsnet in Rust">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10131c"/>
      <stop offset="0.55" stop-color="#161a27"/>
      <stop offset="1" stop-color="#1d2233"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4f5fb"/>
      <stop offset="1" stop-color="#cdd3ec"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2864b"/>
      <stop offset="0.55" stop-color="#ce422b"/>
      <stop offset="1" stop-color="#9c2f20"/>
    </linearGradient>
    <linearGradient id="mesh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c8cff"/>
      <stop offset="1" stop-color="#5560d6"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="300" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="300" rx="20" fill="none" stroke="#2b3147" stroke-width="2"/>

  <!-- left motif: 4-dot tailnet mesh with connecting links + a rust accent ring -->
  <g transform="translate(150 150)">
    <!-- mesh links -->
    <line x1="-58" y1="-58" x2="58" y2="-58" stroke="#39406a" stroke-width="3"/>
    <line x1="-58" y1="58" x2="58" y2="58" stroke="#39406a" stroke-width="3"/>
    <line x1="-58" y1="-58" x2="-58" y2="58" stroke="#39406a" stroke-width="3"/>
    <line x1="58" y1="-58" x2="58" y2="58" stroke="#39406a" stroke-width="3"/>
    <line x1="-58" y1="-58" x2="58" y2="58" stroke="#39406a" stroke-width="3"/>
    <line x1="58" y1="-58" x2="-58" y2="58" stroke="#39406a" stroke-width="3"/>
    <!-- nodes -->
    <circle cx="-58" cy="-58" r="15" fill="url(#mesh)"/>
    <circle cx="58" cy="-58" r="15" fill="url(#mesh)"/>
    <circle cx="-58" cy="58" r="15" fill="url(#mesh)"/>
    <circle cx="58" cy="58" r="15" fill="url(#rust)"/>
    <!-- rust accent ring around the rust node -->
    <circle cx="58" cy="58" r="26" fill="none" stroke="url(#rust)" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- wordmark -->
  <text x="270" y="150" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="800" letter-spacing="-2">
    <tspan fill="url(#word)">tailscale</tspan><tspan fill="url(#rust)">-rs</tspan>
  </text>

  <!-- tagline -->
  <text x="272" y="200" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="500" fill="#9aa3c7" letter-spacing="0.5">
    Pure-Rust Tailscale &#8212; tsnet in Rust
  </text>

  <!-- fork subtext -->
  <text x="272" y="238" font-family="'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="18" font-weight="400" fill="#6b7399" letter-spacing="0.5">
    fork of tailscale/tailscale-rs
  </text>
</svg>
